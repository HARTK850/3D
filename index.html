<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Triplanar Shader Cat</title>
<style>
html, body { width:100%; height:100%; margin:0; overflow:hidden; }
canvas { width:100%; height:100%; }
</style>
</head>
<body>

<canvas id="renderCanvas"></canvas>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

<script>
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);

const createScene = async () => {
    const scene = new BABYLON.Scene(engine);

    // Camera
    const camera = new BABYLON.ArcRotateCamera("cam",
        Math.PI/2, Math.PI/3, 3,
        new BABYLON.Vector3(0,1,0), scene);
    camera.attachControl(canvas, true);

    // Light
    new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0,1,0), scene);

    // Load model
    const result = await BABYLON.SceneLoader.ImportMeshAsync("",
        "https://raw.githubusercontent.com/HARTK850/3D/main/",
        "white_mesh.obj",
        scene
    );

    const mesh = result.meshes[0];

    // ===== Shader =====
    BABYLON.Effect.ShadersStore["triplanarVertexShader"] = `
        precision highp float;

        attribute vec3 position;
        attribute vec3 normal;

        uniform mat4 worldViewProjection;
        uniform mat4 world;

        varying vec3 vPosition;
        varying vec3 vNormal;

        void main(void) {
            vPosition = (world * vec4(position, 1.0)).xyz;
            vNormal = normalize((world * vec4(normal, 0.0)).xyz);
            gl_Position = worldViewProjection * vec4(position, 1.0);
        }
    `;

    BABYLON.Effect.ShadersStore["triplanarFragmentShader"] = `
        precision highp float;

        varying vec3 vPosition;
        varying vec3 vNormal;

        uniform sampler2D textureSampler;

        void main(void) {
            vec3 normal = normalize(vNormal);
            vec3 blend = abs(normal);
            blend = normalize(max(blend, 0.00001));
            blend /= (blend.x + blend.y + blend.z);

            vec4 xColor = texture2D(textureSampler, vPosition.yz * 0.5);
            vec4 yColor = texture2D(textureSampler, vPosition.xz * 0.5);
            vec4 zColor = texture2D(textureSampler, vPosition.xy * 0.5);

            vec4 color =
                xColor * blend.x +
                yColor * blend.y +
                zColor * blend.z;

            gl_FragColor = color;
        }
    `;

    const shaderMaterial = new BABYLON.ShaderMaterial("shader", scene, {
        vertex: "triplanar",
        fragment: "triplanar",
    }, {
        attributes: ["position", "normal"],
        uniforms: ["world", "worldViewProjection"],
        samplers: ["textureSampler"]
    });

    const texture = new BABYLON.Texture(
        "https://raw.githubusercontent.com/HARTK850/3D/main/SAT.jpg",
        scene
    );

    shaderMaterial.setTexture("textureSampler", texture);

    mesh.material = shaderMaterial;

    return scene;
};

createScene().then(scene => {
    engine.runRenderLoop(() => scene.render());
});

window.addEventListener("resize", () => engine.resize());
</script>

</body>
</html>
