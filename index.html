<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8" />
<title>מחולל דף הצללה</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
  padding: 20px;
}
canvas {
  margin-top: 20px;
  border: 1px solid #ccc;
  background: white;
}
button {
  margin: 10px;
  padding: 10px 15px;
  cursor: pointer;
}
</style>
</head>
<body>

<h2>מחולל דף הצללה מתמונה</h2>

<input type="file" id="upload" accept="image/*">
<br>

<button onclick="downloadImage()">הורדה</button>

<canvas id="canvas"></canvas>

<script>
const upload = document.getElementById('upload');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

upload.addEventListener('change', function(e) {
  const file = e.target.files[0];
  const img = new Image();
  img.onload = function() {

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let data = imageData.data;

    // המרה לשחור-לבן + אפקט הצללה
    for (let i = 0; i < data.length; i += 4) {
      let avg = (data[i] + data[i+1] + data[i+2]) / 3;

      // יצירת הצללה (קווים דיגיטליים פשוטים)
      let pattern = (Math.floor((i / 4) % 10) < 5) ? 0.85 : 1;

      avg = avg * pattern;

      data[i] = data[i+1] = data[i+2] = avg;
    }

    ctx.putImageData(imageData, 0, 0);
  };

  img.src = URL.createObjectURL(file);
});

function downloadImage() {
  const link = document.createElement('a');
  link.download = 'worksheet.png';
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
