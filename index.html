<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babylon.js - חתול תלת-ממדי</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/serializers/babylonjs.serializers.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }
        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #ff8c00;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #e07b00;
        }
    </style>
</head>
<body>

    <div id="ui-panel">
        <button id="exportBtn">הורד מודל (GLB)</button>
    </div>
    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color3(0.9, 0.9, 0.9);

            // מצלמה אינטראקטיבית
            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 2.5, 5, BABYLON.Vector3.Zero(), scene);
            camera.attachControl(canvas, true);
            camera.wheelPrecision = 50;

            // תאורה הימיספרית (אור סביבתי)
            const hemiLight = new BABYLON.HemisphericLight("hemiLight", new BABYLON.Vector3(0, 1, 0), scene);
            hemiLight.intensity = 0.6;

            // תאורת כיוון ליצירת צללים
            const dirLight = new BABYLON.DirectionalLight("dirLight", new BABYLON.Vector3(-1, -2, -1), scene);
            dirLight.position = new BABYLON.Vector3(5, 10, 5);
            dirLight.intensity = 0.8;

            // מחולל צללים
            const shadowGenerator = new BABYLON.ShadowGenerator(1024, dirLight);
            shadowGenerator.useBlurExponentialShadowMap = true;

            // חומרים (Materials)
            const orangeMat = new BABYLON.StandardMaterial("orangeMat", scene);
            orangeMat.diffuseColor = new BABYLON.Color3(1, 0.5, 0); // כתום

            const whiteMat = new BABYLON.StandardMaterial("whiteMat", scene);
            whiteMat.diffuseColor = new BABYLON.Color3(1, 1, 1); // לבן

            const blackMat = new BABYLON.StandardMaterial("blackMat", scene);
            blackMat.diffuseColor = new BABYLON.Color3(0.1, 0.1, 0.1); // שחור לעיניים

            // --- בניית החתול ---
            const catRoot = new BABYLON.Mesh("cat", scene);

            // גוף
            const body = BABYLON.MeshBuilder.CreateCapsule("body", {height: 1.2, radius: 0.4}, scene);
            body.rotation.z = Math.PI / 2;
            body.material = orangeMat;
            body.parent = catRoot;
            shadowGenerator.addShadowCaster(body);

            // בטן לבנה (חצי עיגול)
            const belly = BABYLON.MeshBuilder.CreateSphere("belly", {diameterX: 0.6, diameterY: 0.4, diameterZ: 0.7}, scene);
            belly.position.y = -0.1;
            belly.material = whiteMat;
            belly.parent = body;

            // ראש
            const head = BABYLON.MeshBuilder.CreateSphere("head", {diameter: 0.7}, scene);
            head.position.set(0.6, 0.4, 0);
            head.material = orangeMat;
            head.parent = catRoot;
            shadowGenerator.addShadowCaster(head);

            // אוזניים
            const earL = BABYLON.MeshBuilder.CreateCylinder("earL", {diameterTop: 0, diameterBottom: 0.2, height: 0.3, tessellation: 3}, scene);
            earL.position.set(0.65, 0.8, 0.15);
            earL.material = orangeMat;
            earL.parent = catRoot;

            const earR = earL.clone("earR");
            earR.position.z = -0.15;

            // עיניים
            const eyeL = BABYLON.MeshBuilder.CreateSphere("eyeL", {diameter: 0.08}, scene);
            eyeL.position.set(0.9, 0.5, 0.15);
            eyeL.material = blackMat;
            eyeL.parent = catRoot;

            const eyeR = eyeL.clone("eyeR");
            eyeR.position.z = -0.15;

            // רגליים
            const legPos = [
                {x: 0.4, z: 0.25}, {x: 0.4, z: -0.25},
                {x: -0.4, z: 0.25}, {x: -0.4, z: -0.25}
            ];
            legPos.forEach((pos, i) => {
                const leg = BABYLON.MeshBuilder.CreateCylinder("leg" + i, {diameter: 0.15, height: 0.4}, scene);
                leg.position.set(pos.x, -0.4, pos.z);
                leg.material = whiteMat;
                leg.parent = catRoot;
                shadowGenerator.addShadowCaster(leg);
            });

            // זנב
            const tail = BABYLON.MeshBuilder.CreateCapsule("tail", {height: 0.6, radius: 0.08}, scene);
            tail.position.set(-0.7, 0.3, 0);
            tail.rotation.z = -Math.PI / 4;
            tail.material = orangeMat;
            tail.parent = catRoot;

            // קרקע
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 10, height: 10}, scene);
            ground.position.y = -0.6;
            ground.receiveShadows = true;
            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.8, 0.8, 0.8);
            ground.material = groundMat;

            return scene;
        };

        const scene = createScene();

        // לולאת רינדור
        engine.runRenderLoop(function () {
            scene.render();
        });

        // התאמה לשינוי גודל חלון
        window.addEventListener("resize", function () {
            engine.resize();
        });

        // פונקציונליות ייצוא ל-GLB
        document.getElementById("exportBtn").addEventListener("click", function() {
            BABYLON.GLTF2Export.GLBAsync(scene, "my_cute_cat").then((glb) => {
                glb.downloadFiles();
            });
        });
    </script>
</body>
</html>
